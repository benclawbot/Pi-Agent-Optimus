<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Agent Optimus - Evaluation Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-yellow: #eab308;
            --accent-red: #ef4444;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --border: #475569;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1.5rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
        .header h1 span { color: var(--accent-blue); }
        .header-info { display: flex; gap: 1rem; align-items: center; }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        .status-loading { background: var(--accent-yellow); color: #000; }
        .status-error { background: var(--accent-red); color: #fff; }
        .status-ok { background: var(--accent-green); color: #000; }
        
        .refresh-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .refresh-btn:hover { background: var(--bg-tertiary); }
        
        .scorecard { 
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .scorecard-main { text-align: center; }
        
        .overall-score {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .overall-label { color: var(--text-secondary); font-size: 1rem; margin-top: 0.5rem; }
        
        .scorecard-comparison { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 2rem; 
            margin-top: 1.5rem;
            padding-top: 1.5rem; 
            border-top: 1px solid var(--border); 
        }
        
        .comparison-item { text-align: center; }
        .comparison-label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; }
        .comparison-value { font-size: 1.5rem; font-weight: 700; }
        .comparison-arrow { color: var(--text-muted); font-size: 1.5rem; }
        .improvement { color: var(--accent-green); }
        .regression { color: var(--accent-red); }
        
        .error-banner {
            background: var(--accent-red);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        .error-banner.show { display: block; }
        
        .latency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .latency-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }
        .latency-value { font-size: 1.5rem; font-weight: 700; color: var(--accent-cyan); }
        .latency-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
        
        .section-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        
        .dimension-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .dimension-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
        }
        
        .dimension-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .dimension-name { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        
        .dimension-icon {
            width: 28px; height: 28px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.875rem;
        }
        
        .dimension-weight { font-size: 0.7rem; color: var(--text-muted); background: var(--bg-tertiary); padding: 0.15rem 0.4rem; border-radius: 4px; }
        
        .dimension-score { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
        
        .score-bar { height: 5px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; margin-bottom: 0.75rem; }
        .score-bar-fill { height: 100%; border-radius: 3px; }
        
        .dimension-metrics { font-size: 0.7rem; color: var(--text-muted); }
        .metric-row { display: flex; justify-content: space-between; padding: 0.15rem 0; }
        
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; }
        .chart-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .chart-header { display: flex; justify-content: space-between; margin-bottom: 1rem; }
        .chart-title { font-weight: 600; }
        .chart-note { font-size: 0.75rem; color: var(--text-muted); }
        .chart-container { position: relative; height: 250px; }
        
        .no-data {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .charts-grid { grid-template-columns: 1fr; }
            .scorecard-comparison { flex-wrap: wrap; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 <span>Pi Agent Optimus</span> - Evaluation Dashboard</h1>
        <div class="header-info">
            <span class="status-badge" id="statusBadge">Loading...</span>
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
        </div>
    </div>

    <div class="error-banner" id="errorBanner">
        <strong>Error:</strong> <span id="errorMessage"></span>
        <button onclick="loadData()" style="margin-left: 1rem; padding: 0.25rem 0.5rem; cursor: pointer;">Retry</button>
    </div>

    <div class="scorecard">
        <div class="scorecard-main">
            <div class="overall-score" id="overallScore">--</div>
            <div class="overall-label">Overall Performance Score</div>
            <div class="version-badge" id="versionBadge" style="display: inline-block; background: var(--bg-tertiary); padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; margin-top: 0.5rem;">v1.0</div>
        </div>
        <div class="scorecard-comparison">
            <div class="comparison-item">
                <span class="comparison-label">First Run</span>
                <span class="comparison-value" id="firstRunScore">--</span>
            </div>
            <div class="comparison-arrow">→</div>
            <div class="comparison-item">
                <span class="comparison-label">Current</span>
                <span class="comparison-value" id="currentScore">--</span>
            </div>
            <div class="comparison-item improvement" id="improvementItem">
                <span class="comparison-label">Improvement</span>
                <span class="comparison-value" id="improvementPercent">--</span>
            </div>
        </div>
    </div>

    <div class="latency-grid" id="latencyGrid">
        <div class="latency-card">
            <div class="latency-value" id="latencyP50">--</div>
            <div class="latency-label">P50 (s)</div>
        </div>
        <div class="latency-card">
            <div class="latency-value" id="latencyP95">--</div>
            <div class="latency-label">P95 (s)</div>
        </div>
        <div class="latency-card">
            <div class="latency-value" id="avgTokens">--</div>
            <div class="latency-label">Avg Tokens</div>
        </div>
        <div class="latency-card">
            <div class="latency-value" id="taskSuccess">--</div>
            <div class="latency-label">Success %</div>
        </div>
    </div>

    <h2 class="section-title">📊 Dimensions</h2>
    <div class="dimension-grid" id="dimensionGrid">
        <div class="no-data">Loading dimensions...</div>
    </div>

    <h2 class="section-title">📈 Trends</h2>
    <div class="charts-grid">
        <div class="chart-card">
            <div class="chart-header">
                <span class="chart-title">Overall Score Trend</span>
                <span class="chart-note" id="trendNote">--</span>
            </div>
            <div class="chart-container">
                <canvas id="overallTrendChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <div class="chart-header">
                <span class="chart-title">Dimension Breakdown</span>
            </div>
            <div class="chart-container">
                <canvas id="dimensionChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const COLORS = {
            speed: '#06b6d4', output_quality: '#22c55e', code_quality: '#3b82f6',
            reasoning: '#a855f7', adaptability: '#ec4899', proactivity: '#f97316',
            reliability: '#eab308', tool_use: '#64748b', user_experience: '#94a3b8', safety: '#ef4444'
        };
        
        const ICONS = {
            speed: '⚡', output_quality: '✓', code_quality: '💻',
            reasoning: '🧠', adaptability: '📈', proactivity: '🚀',
            reliability: '🔒', tool_use: '🔧', user_experience: '👤', safety: '🛡️'
        };
        
        let benchmarkData = null;
        let trendData = null;
        
        function setStatus(text, type = 'ok') {
            const badge = document.getElementById('statusBadge');
            badge.textContent = text;
            badge.className = 'status-badge status-' + type;
        }
        
        function showError(msg) {
            document.getElementById('errorMessage').textContent = msg;
            document.getElementById('errorBanner').classList.add('show');
        }
        
        function hideError() {
            document.getElementById('errorBanner').classList.remove('show');
        }
        
        async function loadData() {
            hideError();
            setStatus('Loading...', 'loading');
            
            try {
                console.log('Loading benchmark data...');
                
                // Load latest results
                const res = await fetch('benchmark/data/latest.json');
                if (!res.ok) throw new Error('Failed to load latest.json: ' + res.status);
                benchmarkData = await res.json();
                console.log('Loaded benchmark data, score:', benchmarkData?.scorecard?.overall_score);
                
                // Load trend data
                try {
                    const trendRes = await fetch('benchmark/data/trend_data.json');
                    if (trendRes.ok) {
                        trendData = await trendRes.json();
                        console.log('Loaded trend data, runs:', trendData?.runs?.length);
                    }
                } catch (e) {
                    console.warn('No trend data:', e);
                    trendData = null;
                }
                
                render();
                setStatus('OK', 'ok');
                
            } catch (error) {
                console.error('Load error:', error);
                showError(error.message);
                setStatus('Error', 'error');
            }
        }
        
        function render() {
            if (!benchmarkData) {
                showError('No benchmark data loaded');
                return;
            }
            
            console.log('Rendering with score:', benchmarkData.scorecard?.overall_score);
            
            // Overall score
            const score = benchmarkData.scorecard?.overall_score ?? 0;
            document.getElementById('overallScore').textContent = score.toFixed(3);
            document.getElementById('versionBadge').textContent = benchmarkData.version || 'v1.0';
            
            // Comparison
            updateComparison();
            
            // Latency
            const lat = benchmarkData.latency_stats || {};
            document.getElementById('latencyP50').textContent = (lat.p50 || 0).toFixed(1);
            document.getElementById('latencyP95').textContent = (lat.p95 || 0).toFixed(1);
            document.getElementById('avgTokens').textContent = Math.round(benchmarkData.token_stats?.avg_tokens || 0);
            
            const successRate = benchmarkData.dimension_scores?.output_quality?.task_success_rate;
            document.getElementById('taskSuccess').textContent = successRate ? Math.round(successRate * 100) : '--';
            
            // Dimensions
            renderDimensions();
            
            // Charts
            renderTrendChart();
            renderDimensionChart();
            
            // Trend note
            if (trendData?.runs?.length) {
                document.getElementById('trendNote').textContent = `${trendData.runs.length} runs`;
            }
        }
        
        function updateComparison() {
            const firstEl = document.getElementById('firstRunScore');
            const currentEl = document.getElementById('currentScore');
            const impEl = document.getElementById('improvementPercent');
            const impItem = document.getElementById('improvementItem');
            
            if (trendData?.runs?.length > 0) {
                const runs = trendData.runs;
                const first = runs[0].overall_score;
                const last = runs[runs.length - 1].overall_score;
                const pct = ((last - first) / first * 100).toFixed(1);
                
                firstEl.textContent = first.toFixed(3);
                currentEl.textContent = last.toFixed(3);
                impEl.textContent = pct >= 0 ? `+${pct}%` : `${pct}%`;
                
                impItem.className = 'comparison-item ' + (pct >= 0 ? 'improvement' : 'regression');
            } else {
                const score = benchmarkData.scorecard?.overall_score ?? 0;
                firstEl.textContent = score.toFixed(3);
                currentEl.textContent = score.toFixed(3);
                impEl.textContent = '--';
                impItem.className = 'comparison-item';
            }
        }
        
        function renderDimensions() {
            const grid = document.getElementById('dimensionGrid');
            const dims = benchmarkData.scorecard?.dimensions;
            
            if (!dims || Object.keys(dims).length === 0) {
                grid.innerHTML = '<div class="no-data">No dimension data available</div>';
                return;
            }
            
            let html = '';
            for (const [name, data] of Object.entries(dims)) {
                const raw = typeof data === 'object' ? (data.raw_score ?? 0) : data;
                const weight = typeof data === 'object' ? (data.weight ?? 0.1) : 0.1;
                const source = typeof data === 'object' ? (data.source ?? 'real') : 'real';
                const color = COLORS[name] || '#64748b';
                const icon = ICONS[name] || '📊';
                
                html += `
                    <div class="dimension-card">
                        <div class="dimension-header">
                            <span class="dimension-name">
                                <span class="dimension-icon" style="background:${color}30;color:${color}">${icon}</span>
                                ${name.replace('_', ' ')}
                            </span>
                            <span class="dimension-weight">${(weight * 100).toFixed(0)}%</span>
                        </div>
                        <div class="dimension-score" style="color:${color}">${(raw * 100).toFixed(0)}%</div>
                        <div class="score-bar"><div class="score-bar-fill" style="width:${(raw * 100).toFixed(0)}%;background:${color}"></div></div>
                        <div class="dimension-metrics">
                            <div class="metric-row"><span>Raw</span><span>${raw.toFixed(3)}</span></div>
                            <div class="metric-row"><span>Source</span><span>${source === 'real' ? '📊 Real' : '⚠️ Est'}</span></div>
                        </div>
                    </div>
                `;
            }
            
            grid.innerHTML = html || '<div class="no-data">No dimensions to display</div>';
        }
        
        function renderTrendChart() {
            const canvas = document.getElementById('overallTrendChart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = 250;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let points = [], labels = [];
            
            if (trendData?.runs?.length > 0) {
                points = trendData.runs.map(r => r.overall_score);
                labels = trendData.runs.map(r => r.version || r.timestamp?.split('T')[0] || '');
            } else {
                const score = benchmarkData.scorecard?.overall_score ?? 0.5;
                points = [score];
                labels = [benchmarkData.version || 'current'];
            }
            
            if (points.length === 0) {
                ctx.fillStyle = '#64748b';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('No trend data', canvas.width/2, canvas.height/2);
                return;
            }
            
            const pad = {top: 20, right: 20, bottom: 30, left: 40};
            const w = canvas.width, h = canvas.height;
            
            // Grid
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 4; i++) {
                const y = pad.top + (h - pad.top - pad.bottom) * i / 4;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(w - pad.right, y);
                ctx.stroke();
                ctx.fillStyle = '#64748b';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText((1 - i * 0.25).toFixed(1), pad.left - 5, y + 4);
            }
            
            // Line
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 3;
            ctx.beginPath();
            points.forEach((p, i) => {
                const x = pad.left + (w - pad.left - pad.right) * i / Math.max(points.length - 1, 1);
                const y = pad.top + (h - pad.top - pad.bottom) * (1 - p);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();
            
            // Area
            ctx.lineTo(pad.left + (w - pad.left - pad.right), h - pad.bottom);
            ctx.lineTo(pad.left, h - pad.bottom);
            ctx.closePath();
            const grad = ctx.createLinearGradient(0, pad.top, 0, h - pad.bottom);
            grad.addColorStop(0, '#3b82f640');
            grad.addColorStop(1, '#3b82f600');
            ctx.fillStyle = grad;
            ctx.fill();
            
            // Points
            points.forEach((p, i) => {
                const x = pad.left + (w - pad.left - pad.right) * i / Math.max(points.length - 1, 1);
                const y = pad.top + (h - pad.top - pad.bottom) * (1 - p);
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#3b82f6';
                ctx.fill();
            });
            
            // Labels
            ctx.fillStyle = '#94a3b8';
            ctx.font = '9px sans-serif';
            ctx.textAlign = 'center';
            const step = Math.max(1, Math.floor(labels.length / 6));
            labels.forEach((l, i) => {
                if (i % step === 0 || i === labels.length - 1) {
                    const x = pad.left + (w - pad.left - pad.right) * i / Math.max(points.length - 1, 1);
                    ctx.fillText(l || '', x, h - 8);
                }
            });
        }
        
        function renderDimensionChart() {
            const canvas = document.getElementById('dimensionChart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = 250;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const dims = benchmarkData.scorecard?.dimensions;
            if (!dims || Object.keys(dims).length === 0) {
                ctx.fillStyle = '#64748b';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('No dimension data', canvas.width/2, canvas.height/2);
                return;
            }
            
            const entries = Object.entries(dims);
            const barW = Math.min(50, (canvas.width - 40) / entries.length - 8);
            const startX = 35;
            
            entries.forEach(([name, data], i) => {
                const raw = typeof data === 'object' ? (data.raw_score ?? 0) : data;
                const barH = raw * (canvas.height - 40);
                const x = startX + i * (barW + 8);
                const y = canvas.height - 30 - barH;
                const color = COLORS[name] || '#64748b';
                
                ctx.fillStyle = color;
                ctx.fillRect(x, y, barW, barH);
                
                ctx.fillStyle = '#94a3b8';
                ctx.font = '8px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(name.replace('_', '\n').substring(0, 8), x + barW/2, canvas.height - 10);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 9px sans-serif';
                ctx.fillText((raw * 100).toFixed(0) + '%', x + barW/2, y - 5);
            });
        }
        
        // Load on start
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
